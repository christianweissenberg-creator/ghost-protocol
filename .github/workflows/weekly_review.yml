name: Weekly Sprint Review

on:
  schedule:
    # Sonntags um 20:00 UTC (22:00 MESZ)
    - cron: '0 20 * * 0'
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env
          echo "SERPER_API_KEY=${{ secrets.SERPER_API_KEY }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env

      # TODO: Sprint 4 — Strategist Agent für automatisches Review
      - name: Weekly Review (Placeholder)
        run: echo "Weekly Review — Strategist Agent wird in Sprint 4 implementiert"
